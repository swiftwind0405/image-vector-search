services:
  image-vector-search:
    build:
      context: .
    container_name: image-vector-search
    ports:
      - "9866:8000"
    environment:
      IMAGE_SEARCH_EMBEDDING_PROVIDER: ${IMAGE_SEARCH_EMBEDDING_PROVIDER:-jina}
      IMAGE_SEARCH_JINA_API_KEY: ${IMAGE_SEARCH_JINA_API_KEY:-}
      IMAGE_SEARCH_GOOGLE_API_KEY: ${IMAGE_SEARCH_GOOGLE_API_KEY:-}
      IMAGE_SEARCH_IMAGES_ROOT: /data/images
      IMAGE_SEARCH_INDEX_ROOT: /data/index
    volumes:
      - ./example-images:/data/images:ro
      - ./example-index:/data/index
