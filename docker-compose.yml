services:
  image-search-mcp:
    build:
      context: .
    container_name: image-search-mcp
    ports:
      - "8000:8000"
    environment:
      IMAGE_SEARCH_JINA_API_KEY: ${IMAGE_SEARCH_JINA_API_KEY:?set IMAGE_SEARCH_JINA_API_KEY}
      IMAGE_SEARCH_IMAGES_ROOT: /data/images
      IMAGE_SEARCH_INDEX_ROOT: /data/index
    volumes:
      - ./example-images:/data/images:ro
      - ./example-index:/data/index
